name: subset-then-shape
description: Subset a font to the glyphs a text needs, then shape that text with the subsetted font.
nodes:
    - alias: subset
      package: christiangeorgelucas/text-shaping-tools@0.1.2
      node: SubsetFont
      col: 0
      row: 0
    - alias: shape
      package: christiangeorgelucas/text-shaping-tools@0.1.2
      node: ShapeText
      col: 1
      row: 0
edges:
    - from: subset
      to: shape
      adapter:
        literal("fi"): text
        subset_font_data: font.font_data
start: subset
